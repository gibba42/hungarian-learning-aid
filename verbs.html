<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verbs | Hungarian Learning Aid</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="scripts/verbs.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>Verbs</h1>
        <nav aria-label="Main navigation">
          <ul class="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="vocabulary.html">Vocabulary</a></li>
            <li><a href="verbs.html" aria-current="page">Verbs</a></li>
            <li><a href="grammar.html">Grammar</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="panel study-nav" aria-label="Study sections">
        <a class="button-link" href="index.html">Home</a>
        <a class="button-link" href="vocabulary.html">Vocabulary</a>
        <a class="button-link" href="verbs.html" aria-current="page">Verbs</a>
        <a class="button-link" href="grammar.html">Grammar</a>
      </section>

      <section class="panel">
        <h2>Verb Practice</h2>
        <p>Each card shows the English infinitive, tense, and pronoun. Click to reveal the Hungarian form.</p>
        <div class="filters" aria-label="Verb filters">
          <label>
            Verb
            <select id="verb-filter"></select>
          </label>
          <label>
            Tense
            <select id="tense-filter"></select>
          </label>
        </div>
        <p id="verb-count" class="meta"></p>
      </section>


      <section class="panel" aria-live="polite">
        <h2>Verb Quiz</h2>
        <p>Practice one conjugation at a time. Reveal the form, score yourself, and continue.</p>
        <p id="verb-quiz-score" class="meta"></p>
        <div id="verb-quiz-card" class="quiz-card">
          <div id="verb-quiz-prompt" class="prompt"></div>
          <div id="verb-quiz-meta"></div>
          <div id="verb-quiz-answer" class="answer hidden"></div>
        </div>
        <div class="quiz-actions">
          <button id="verb-quiz-reveal" class="button-link" type="button">Reveal answer</button>
          <button id="verb-quiz-correct" class="button-link" type="button">I was correct</button>
          <button id="verb-quiz-incorrect" class="button-link" type="button">I was incorrect</button>
          <button id="verb-quiz-next" class="button-link" type="button">Next item</button>
          <button id="verb-quiz-reset" class="button-link" type="button">Restart quiz</button>
        </div>
      </section>

      <section id="verb-cards" class="grid cards" aria-live="polite"></section>
    </main>
  </body>
</html>
