<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vocabulary | Hungarian Learning Aid</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="scripts/vocabulary.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>Vocabulary</h1>
        <nav aria-label="Main navigation">
          <ul class="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="vocabulary.html" aria-current="page">Vocabulary</a></li>
            <li><a href="verbs.html">Verbs</a></li>
            <li><a href="grammar.html">Grammar</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="panel study-nav" aria-label="Study sections">
        <a class="button-link" href="index.html">Home</a>
        <a class="button-link" href="vocabulary.html" aria-current="page">Vocabulary</a>
        <a class="button-link" href="verbs.html">Verbs</a>
        <a class="button-link" href="grammar.html">Grammar</a>
      </section>

      <section class="panel">
        <h2>Flashcards</h2>
        <p>Click a card to reveal the English translation.</p>
        <div class="filters" aria-label="Vocabulary filters">
          <label>
            Content
            <select id="type-filter"></select>
          </label>
          <label>
            Category
            <select id="category-filter"></select>
          </label>
        </div>
        <p id="vocab-count" class="meta"></p>
      </section>
      <section id="vocab-cards" class="grid cards" aria-live="polite"></section>
    </main>
  </body>
</html>
